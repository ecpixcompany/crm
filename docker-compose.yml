services:
  web:
    build:
      context: .
      args:
        VITE_STRAPI_BASE_URL: ${VITE_STRAPI_BASE_URL}
        VITE_STRAPI_TOKEN: ${VITE_STRAPI_TOKEN}
        VITE_N8N_WSP_WEBHOOK: ${VITE_N8N_WSP_WEBHOOK}
        VITE_N8N_WSP_TIMEOUT_MS: ${VITE_N8N_WSP_TIMEOUT_MS}
    expose:
      - "4173"
    restart: unless-stopped
